<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Randy — Recast SE Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Warm the TLS connection to the answer proxy early. Apps Script serves
         from script.google.com and 302-redirects the response through
         script.googleusercontent.com, so preconnect both — this shaves the
         handshake off the first overheard question. -->
    <link rel="preconnect" href="https://script.google.com" crossorigin>
    <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- Tailwind: a static local build (Preflight + the utilities this app uses).
         The cdn.tailwindcss.com runtime can't run under the Manifest V3 CSP. -->
    <link href="tailwind.css" rel="stylesheet">
    <!-- Lucide icons, vendored locally (exposes window.lucide). -->
    <script src="lib/lucide.min.js"></script>
    <link href="panel.css" rel="stylesheet">
  </head>
  <body class="antialiased">
    <div id="app"></div>
    <script src="panel.js"></script>
  </body>
</html>
